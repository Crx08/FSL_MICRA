# =====================================================
# CONNESSIONE MYSQL
# Il database "biblioteca" deve essere creato PRIMA
# eseguendo Progetto_biblioteca.sql in MySQL Workbench
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# none = le tabelle vengono gestite solo da MySQL Workbench
# =====================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Non eseguire data.sql automaticamente
spring.sql.init.mode=never
