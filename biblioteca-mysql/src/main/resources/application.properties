spring.application.name=biblioteca

# === CONNESSIONE MySQL ===
# Sostituisci "biblioteca_db" con il nome esatto del tuo schema MySQL
# Sostituisci "root" e "password" con le tue credenziali MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_db
spring.datasource.username=root
spring.datasource.password=password

# === JPA / Hibernate ===
# "update" = aggiorna le tabelle senza cancellarle (non tocca i dati esistenti)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Mostra le query SQL nel log (utile per il debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
